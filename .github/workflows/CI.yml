name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Precompile the test environment ONCE and seed julia-actions/cache, so the
  # shard jobs restore a warm depot instead of each paying the ~25-min cold
  # precompile. `TEST_GROUP=none` runs zero test files — Pkg.test still
  # precompiles the env before invoking runtests.jl, which is all we need here.
  # Uses --check-bounds=auto so the cached precompile matches what the shards run
  # (Pkg.test's default --check-bounds=yes is a different config and would force
  # a full recompile).
  prepare:
    name: prepare (precompile + seed cache)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Precompile test environment
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; julia_args=["--check-bounds=auto"])'
        env:
          TEST_GROUP: "none"
          TEST_GROUPS: "8"

  # Fast PR gate: 8 sharded test jobs WITHOUT coverage, restoring the warm cache
  # seeded by `prepare`. Coverage is ~4x slower and runs in a separate,
  # non-blocking workflow (Coverage.yml).
  test:
    name: test ubuntu - shard ${{ matrix.group }}/8
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run tests (no coverage)
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; julia_args=["--check-bounds=auto"])'
        env:
          TEST_GROUP: ${{ matrix.group }}
          TEST_GROUPS: "8"

  # macOS runners are slow + expensive; run them only on pushes to main as a
  # platform-sanity check (no coverage). Own prepare (the macOS cache key differs
  # from the Linux one).
  prepare-macos:
    name: prepare macos (precompile + seed cache)
    runs-on: macos-latest
    if: github.event_name == 'push'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Precompile test environment
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; julia_args=["--check-bounds=auto"])'
        env:
          TEST_GROUP: "none"
          TEST_GROUPS: "8"

  test-macos:
    name: test macos - shard ${{ matrix.group }}/8
    needs: prepare-macos
    if: github.event_name == 'push'
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run tests (no coverage)
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; julia_args=["--check-bounds=auto"])'
        env:
          TEST_GROUP: ${{ matrix.group }}
          TEST_GROUPS: "8"
